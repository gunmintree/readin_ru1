<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>리드인 고척점 전용 페이지</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #0a1628;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  #app-host {
    width: 100%;
    height: 100%;
  }
  .online-lock {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
    color: #fff;
    background: #0a1628;
    text-align: center;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  }
  .online-lock[hidden] { display: none; }
  .online-lock strong { font-size: 22px; }
  .online-lock span { color: rgba(255,255,255,0.72); font-size: 15px; }
  .auth-lock {
    position: fixed;
    inset: 0;
    z-index: 99998;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #fff;
    background: #0a1628;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  }
  .auth-lock[hidden] { display: none; }
  .auth-card {
    width: min(100%, 360px);
    padding: 28px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    background: #0d2147;
    box-shadow: 0 18px 50px rgba(0,0,0,0.38);
    text-align: center;
  }
  .auth-card h1 { margin: 0 0 8px; font-size: 24px; }
  .auth-card p { margin: 0 0 20px; color: rgba(255,255,255,0.72); font-size: 14px; }
  .auth-card input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #fff;
    background: rgba(255,255,255,0.08);
    font-size: 17px;
    outline: none;
  }
  .auth-card input:focus { border-color: #5b9df5; }
  .auth-card button {
    width: 100%;
    height: 48px;
    margin-top: 12px;
    border: 0;
    border-radius: 10px;
    color: #fff;
    background: #1e5fcc;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .auth-card button:disabled { opacity: 0.55; cursor: wait; }
  .auth-error { margin: 12px 0 0 !important; color: #ff8c82 !important; }
  .auth-error[hidden] { display: none; }
</style>
</head>
<body>
  <div class="online-lock" data-online-lock role="alert" aria-live="assertive">
    <strong data-online-lock-title>온라인 연결 확인 중</strong>
    <span data-online-lock-message>잠시만 기다려 주세요.</span>
  </div>
  <div class="auth-lock" data-auth-lock>
    <form class="auth-card" data-auth-form>
      <h1>최초 인증</h1>
      <p>처음 한 번만 비밀번호를 입력해 주세요.</p>
      <input type="password" data-auth-password aria-label="인증 비밀번호" autocomplete="current-password" autocapitalize="none" spellcheck="false" required>
      <button type="submit" data-auth-submit>인증하기</button>
      <p class="auth-error" data-auth-error role="alert" hidden></p>
    </form>
  </div>
  <div id="app-host"></div>
  <script src="online-guard.js"></script>
  <script>
    const appHost = document.getElementById('app-host');
    let appFrame = null;

    OnlineGuard.start({
      onReady() {
        if (appFrame) return;
        appFrame = document.createElement('iframe');
        appFrame.src = 'readin_focus_rhythm_v1.html';
        appFrame.title = '리드인 고척점 전용 페이지';
        appFrame.allow = 'autoplay; fullscreen';
        appHost.appendChild(appFrame);
      }
    });
  </script>
</body>
</html>
